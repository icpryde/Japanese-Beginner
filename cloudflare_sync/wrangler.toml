[vars]
# Set this to your GitHub Pages origin (no trailing slash)
ALLOWED_ORIGIN = "https://icpryde.github.io"

[[kv_namespaces]]
binding = "PROGRESS_KV"
# Replace these after creating your KV namespace
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
